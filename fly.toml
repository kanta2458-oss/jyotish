# Fly.io デプロイ設定
# fly launch で自動生成される app 名に合わせて編集してください
app = "kp-jyotish"
primary_region = "nrt"   # 東京リージョン

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
